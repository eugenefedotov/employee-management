<mat-card>
  <mat-card-header>
    <mat-card-title>{{ isEditMode ? 'Edit employee' : 'Add employee' }}</mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="save()">
      <div class="row">
        <mat-form-field appearance="outline" class="half-width">
          <mat-label>First name</mat-label>
          <input matInput formControlName="firstName" />
        </mat-form-field>

        <mat-form-field appearance="outline" class="half-width">
          <mat-label>Last name</mat-label>
          <input matInput formControlName="lastName" />
        </mat-form-field>
      </div>

      <div class="row">
        <mat-form-field appearance="outline" class="half-width">
          <mat-label>Office</mat-label>
          <mat-select formControlName="office">
            <mat-option value="Riga">Riga</mat-option>
            <mat-option value="Tallinn">Tallinn</mat-option>
            <mat-option value="Vilnius">Vilnius</mat-option>
          </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline" class="half-width">
          <mat-label>Date of birth</mat-label>
          <input matInput [matDatepicker]="picker" formControlName="dateOfBirth" readonly />
          <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
          <mat-datepicker #picker></mat-datepicker>
        </mat-form-field>
      </div>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Phone number</mat-label>
        <input matInput formControlName="phoneNumber" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Positive tags</mat-label>
        <mat-select formControlName="positiveTagIds" multiple>
          @for (tag of positiveTags(); track tag._id) {
            <mat-option [value]="tag._id">{{ tag.name }}</mat-option>
          }
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Negative tags</mat-label>
        <mat-select formControlName="negativeTagIds" multiple>
          @for (tag of negativeTags(); track tag._id) {
            <mat-option [value]="tag._id">{{ tag.name }}</mat-option>
          }
        </mat-select>
      </mat-form-field>

      <div class="actions">
        <button mat-button type="button" (click)="cancel()">Cancel</button>
        <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid || isSaving() || form.pristine">
          Save
        </button>
      </div>
    </form>
  </mat-card-content>
</mat-card>
