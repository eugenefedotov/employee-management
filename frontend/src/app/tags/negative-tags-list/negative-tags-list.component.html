<div class="header">
  <h2>Negative tags</h2>
  <button mat-flat-button color="primary" (click)="openCreateDialog()">
    <mat-icon>add</mat-icon>
    Add tag
  </button>
</div>

<table mat-table [dataSource]="tags()">
  <ng-container matColumnDef="color">
    <th mat-header-cell *matHeaderCellDef>Color</th>
    <td mat-cell *matCellDef="let tag">
      <span class="color-swatch" [style.background-color]="tag.color"></span>
    </td>
  </ng-container>

  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef>Name</th>
    <td mat-cell *matCellDef="let tag">{{ tag.name }}</td>
  </ng-container>

  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef></th>
    <td mat-cell *matCellDef="let tag">
      <button mat-icon-button aria-label="Edit tag" (click)="openEditDialog(tag)">
        <mat-icon>edit</mat-icon>
      </button>
      <button mat-icon-button aria-label="Delete tag" (click)="deleteTag(tag)">
        <mat-icon>delete</mat-icon>
      </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
</table>
